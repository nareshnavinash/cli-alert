name: Publish Chocolatey Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.3.1)'
        required: true
        default: '1.3.1'

jobs:
  publish-choco:
    name: Pack and push to Chocolatey
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify version matches nuspec
        shell: pwsh
        run: |
          $nuspecVersion = ([xml](Get-Content packaging/chocolatey.nuspec)).package.metadata.version
          if ($nuspecVersion -ne "${{ github.event.inputs.version }}") {
            Write-Error "Nuspec version ($nuspecVersion) doesn't match input (${{ github.event.inputs.version }})"
            exit 1
          }

      - name: Pack and push
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          Copy-Item packaging/chocolatey.nuspec .
          choco pack chocolatey.nuspec
          $nupkg = (Get-ChildItem shelldone.*.nupkg).FullName
          Write-Host "Pushing $nupkg"
          choco push $nupkg --source https://push.chocolatey.org/ --api-key "$env:CHOCO_API_KEY"
