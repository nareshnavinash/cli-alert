name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all scripts
        run: |
          shellcheck --severity=error bin/shelldone lib/shelldone.sh \
            lib/auto-notify.bash lib/external-notify.sh lib/state.sh \
            lib/ai-hook-common.sh lib/tui.sh \
            hooks/claude-done.sh hooks/claude-notify.sh \
            hooks/codex-done.sh \
            hooks/gemini-done.sh hooks/gemini-notify.sh \
            hooks/copilot-done.sh \
            hooks/cursor-done.sh \
            install.sh uninstall.sh test.sh \
            completions/shelldone.bash
          shellcheck --severity=error -s bash completions/shelldone.zsh

  test-macos:
    name: Test macOS (${{ matrix.shell }})
    runs-on: macos-latest
    strategy:
      matrix:
        shell: [bash, zsh]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: ${{ matrix.shell }} test.sh

  test-linux:
    name: Test Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libnotify
        run: sudo apt-get install -y libnotify-bin
      - name: Run tests
        run: bash test.sh

  test-install:
    name: Test make install round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: make install PREFIX=/tmp/shelldone-test
      - name: Verify version
        run: /tmp/shelldone-test/bin/shelldone version | grep -q "shelldone"
      - name: Verify completions installed
        run: |
          test -f /tmp/shelldone-test/share/bash-completion/completions/shelldone
          test -f /tmp/shelldone-test/share/zsh/site-functions/_shelldone
      - name: Uninstall
        run: make uninstall PREFIX=/tmp/shelldone-test
      - name: Verify removal
        run: "! test -f /tmp/shelldone-test/bin/shelldone"
