name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          awk '/^## \['"${{ steps.version.outputs.VERSION }}"'\]/{found=1; next} /^## \[/{found=0} found' CHANGELOG.md > /tmp/release-notes.md
          echo "Generated release notes:"
          cat /tmp/release-notes.md

      - name: Build Debian package
        run: |
          PKG_DIR="shelldone_${{ steps.version.outputs.VERSION }}-1_all"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/lib/shelldone"
          mkdir -p "${PKG_DIR}/usr/share/shelldone/hooks"
          mkdir -p "${PKG_DIR}/usr/share/bash-completion/completions"
          mkdir -p "${PKG_DIR}/usr/share/zsh/site-functions"

          # Generate binary control file (dpkg-deb needs Package, Version, Maintainer)
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > "${PKG_DIR}/DEBIAN/control" << CTRL_EOF
          Package: shelldone
          Version: ${VERSION}-1
          Architecture: all
          Maintainer: Naresh Sekar <nareshnavinash@gmail.com>
          Depends: bash (>= 4.0)
          Recommends: libnotify-bin, pulseaudio-utils | alsa-utils
          Suggests: espeak
          Homepage: https://github.com/nareshnavinash/shelldone
          Section: utils
          Priority: optional
          Description: Terminal process completion notifier
           Sends OS-native desktop notifications and sounds when long-running
           terminal commands complete. Cross-platform: macOS, Linux, WSL.
          CTRL_EOF
          # Strip heredoc indentation
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"
          cp bin/shelldone "${PKG_DIR}/usr/bin/"
          cp lib/*.sh lib/*.bash lib/*.zsh "${PKG_DIR}/usr/lib/shelldone/"
          cp hooks/*.sh "${PKG_DIR}/usr/share/shelldone/hooks/"
          cp VERSION "${PKG_DIR}/usr/share/shelldone/"
          cp completions/shelldone.bash "${PKG_DIR}/usr/share/bash-completion/completions/shelldone"
          cp completions/shelldone.zsh "${PKG_DIR}/usr/share/zsh/site-functions/_shelldone"

          chmod 755 "${PKG_DIR}/usr/bin/shelldone"
          chmod 755 "${PKG_DIR}/usr/share/shelldone/hooks/"*.sh

          dpkg-deb --build "${PKG_DIR}"

      - name: Compute SHA256 checksums
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEB_FILE="shelldone_${VERSION}-1_all.deb"

          # Download the auto-generated source tarball
          TARBALL="shelldone-${VERSION}.tar.gz"
          curl -sL "https://github.com/nareshnavinash/shelldone/archive/refs/tags/v${VERSION}.tar.gz" -o "${TARBALL}"

          # Compute checksums for both artifacts
          sha256sum "${DEB_FILE}" > checksums.txt
          sha256sum "${TARBALL}" >> checksums.txt

          echo "DEB_SHA256=$(sha256sum "${DEB_FILE}" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "TARBALL_SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.md
          files: |
            shelldone_${{ steps.version.outputs.VERSION }}-1_all.deb
            checksums.txt

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-') }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Compute tarball SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -sL "https://github.com/nareshnavinash/shelldone/archive/refs/tags/v${VERSION}.tar.gz" -o tarball.tar.gz
          echo "SHA256=$(sha256sum tarball.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/checkout@v6
        with:
          repository: nareshnavinash/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write updated formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"
          cat > homebrew-tap/Formula/shelldone.rb << 'FORMULA_EOF'
          # Homebrew formula for shelldone
          # Auto-updated by release workflow

          class Shelldone < Formula
            desc "Terminal process completion notifier - OS-native notifications when commands finish"
            homepage "https://github.com/nareshnavinash/shelldone"
          FORMULA_EOF

          cat >> homebrew-tap/Formula/shelldone.rb << EOF
            url "https://github.com/nareshnavinash/shelldone/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
          EOF

          cat >> homebrew-tap/Formula/shelldone.rb << 'FORMULA_EOF'
            license "MIT"
            head "https://github.com/nareshnavinash/shelldone.git", branch: "main"

            def install
              bin.install "bin/shelldone"
              (lib/"shelldone").install "lib/shelldone.sh", "lib/auto-notify.zsh", "lib/auto-notify.bash",
                                        "lib/state.sh", "lib/external-notify.sh", "lib/ai-hook-common.sh",
                                        "lib/tui.sh"
              (share/"shelldone/hooks").install Dir["hooks/*.sh"]
              (share/"shelldone").install "VERSION"
              bash_completion.install "completions/shelldone.bash" => "shelldone"
              zsh_completion.install "completions/shelldone.zsh" => "_shelldone"
            end

            def caveats
              <<~EOS
                Add to your shell config (~/.zshrc or ~/.bashrc):

                  eval "$(shelldone init zsh)"   # for zsh
                  eval "$(shelldone init bash)"  # for bash

                Or run automatic setup:

                  shelldone setup
              EOS
            end

            test do
              assert_match "shelldone", shell_output("#{bin}/shelldone version")
            end
          end
          FORMULA_EOF

          # Fix indentation (remove leading spaces from heredoc)
          sed -i 's/^          //' homebrew-tap/Formula/shelldone.rb

      - name: Push to tap
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shelldone.rb
          git commit -m "shelldone ${{ steps.version.outputs.VERSION }}"
          git push

  update-scoop-bucket:
    name: Update Scoop bucket
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-') }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Compute tarball SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -sL "https://github.com/nareshnavinash/shelldone/archive/refs/tags/v${VERSION}.tar.gz" -o tarball.tar.gz
          echo "SHA256=$(sha256sum tarball.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout Scoop bucket
        uses: actions/checkout@v6
        with:
          repository: nareshnavinash/scoop-bucket
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"
          cat > scoop-bucket/shelldone.json << EOF
          {
            "version": "${VERSION}",
            "description": "Terminal process completion notifier - OS-native notifications when commands finish",
            "homepage": "https://github.com/nareshnavinash/shelldone",
            "license": "MIT",
            "url": "https://github.com/nareshnavinash/shelldone/archive/refs/tags/v${VERSION}.tar.gz",
            "hash": "${SHA256}",
            "extract_dir": "shelldone-${VERSION}",
            "bin": "bin/shelldone",
            "post_install": [
              "Write-Host 'shelldone installed!' -ForegroundColor Green",
              "Write-Host 'Add to your shell profile: eval \"\$(shelldone init bash)\"' -ForegroundColor Cyan"
            ],
            "checkver": {
              "github": "https://github.com/nareshnavinash/shelldone"
            },
            "autoupdate": {
              "url": "https://github.com/nareshnavinash/shelldone/archive/refs/tags/v\$version.tar.gz",
              "hash": {
                "url": "https://github.com/nareshnavinash/shelldone/releases/download/v\$version/checksums.txt",
                "regex": "([a-fA-F0-9]{64})\\\\s+shelldone-.*\\\\.tar\\\\.gz"
              },
              "extract_dir": "shelldone-\$version"
            }
          }
          EOF

      - name: Push to bucket
        working-directory: scoop-bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shelldone.json
          git commit -m "shelldone ${{ steps.version.outputs.VERSION }}"
          git push

  publish-apt:
    name: Publish to APT repository
    needs: release
    runs-on: ubuntu-latest
    concurrency: apt-publish
    permissions:
      contents: write
    steps:
      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG key
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download .deb from release
        run: |
          gh release download "v${{ steps.version.outputs.VERSION }}" \
            --repo nareshnavinash/shelldone \
            --pattern "*.deb" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Add package to APT repository
        run: |
          cd gh-pages
          reprepro includedeb stable ../*.deb

      - name: Export public GPG key
        run: |
          gpg --armor --export "shelldone APT repo" > gh-pages/KEY.gpg

      - name: Commit and push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "apt: shelldone ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push

  publish-choco:
    name: Publish to Chocolatey
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pack and push
        if: ${{ env.CHOCO_API_KEY != '' }}
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          Copy-Item packaging/chocolatey.nuspec .
          choco pack chocolatey.nuspec
          $nupkg = (Get-ChildItem shelldone.*.nupkg).FullName
          choco push $nupkg --source https://push.chocolatey.org/ --api-key "$env:CHOCO_API_KEY"
