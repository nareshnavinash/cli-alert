name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          awk '/^## \['"${{ steps.version.outputs.VERSION }}"'\]/{found=1; next} /^## \[/{found=0} found' CHANGELOG.md > /tmp/release-notes.md
          echo "Generated release notes:"
          cat /tmp/release-notes.md

      - name: Build Debian package
        run: |
          PKG_DIR="shelldone_${{ steps.version.outputs.VERSION }}-1_all"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/lib/shelldone"
          mkdir -p "${PKG_DIR}/usr/share/shelldone/hooks"
          mkdir -p "${PKG_DIR}/usr/share/bash-completion/completions"
          mkdir -p "${PKG_DIR}/usr/share/zsh/site-functions"

          cp debian/control "${PKG_DIR}/DEBIAN/control"
          cp bin/shelldone "${PKG_DIR}/usr/bin/"
          cp lib/*.sh lib/*.bash lib/*.zsh "${PKG_DIR}/usr/lib/shelldone/"
          cp hooks/*-done.sh "${PKG_DIR}/usr/share/shelldone/hooks/"
          cp VERSION "${PKG_DIR}/usr/share/shelldone/"
          cp completions/shelldone.bash "${PKG_DIR}/usr/share/bash-completion/completions/shelldone"
          cp completions/shelldone.zsh "${PKG_DIR}/usr/share/zsh/site-functions/_shelldone"

          chmod 755 "${PKG_DIR}/usr/bin/shelldone"
          chmod 755 "${PKG_DIR}/usr/share/shelldone/hooks/claude-done.sh"

          dpkg-deb --build "${PKG_DIR}"

      - name: Compute SHA256
        id: sha
        run: |
          sha256sum "shelldone_${{ steps.version.outputs.VERSION }}-1_all.deb" > checksums.txt
          echo "DEB_SHA256=$(cut -d' ' -f1 checksums.txt)" >> "$GITHUB_OUTPUT"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.md
          files: |
            shelldone_${{ steps.version.outputs.VERSION }}-1_all.deb
            checksums.txt
