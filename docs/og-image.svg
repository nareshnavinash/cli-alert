<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#00ff41">
    <line x1="0" y1="0" x2="1200" y2="0" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke-width="1"/>
  </g>

  <!-- Terminal window frame -->
  <rect x="60" y="50" width="1080" height="530" rx="12" fill="#111111" stroke="#222222" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="60" y="50" width="1080" height="40" rx="12" fill="#1a1a1a"/>
  <rect x="60" y="78" width="1080" height="12" fill="#1a1a1a"/>
  <circle cx="90" cy="70" r="7" fill="#ff5f56"/>
  <circle cx="114" cy="70" r="7" fill="#ffbd2e"/>
  <circle cx="138" cy="70" r="7" fill="#27c93f"/>
  <text x="600" y="75" text-anchor="middle" fill="#666666" font-family="monospace" font-size="13">Terminal</text>

  <!-- Prompt line -->
  <text x="100" y="140" fill="#666666" font-family="monospace" font-size="16">$</text>

  <!-- shelldone name - large -->
  <text x="600" y="260" text-anchor="middle" fill="#00ff41" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="96" font-weight="bold" filter="url(#glow)">shelldone</text>

  <!-- Blinking cursor -->
  <rect x="838" y="228" width="12" height="40" fill="#00ff41" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" fill="#cccccc" font-family="'SF Mono', 'Fira Code', monospace" font-size="26">Never miss a finished build again.</text>

  <!-- Feature pills -->
  <g transform="translate(600, 390)">
    <!-- Desktop -->
    <rect x="-480" y="-18" width="120" height="36" rx="18" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <text x="-420" y="6" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14" opacity="0.9">Desktop</text>

    <!-- Slack -->
    <rect x="-330" y="-18" width="100" height="36" rx="18" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <text x="-280" y="6" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14" opacity="0.9">Slack</text>

    <!-- Discord -->
    <rect x="-200" y="-18" width="120" height="36" rx="18" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <text x="-140" y="6" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14" opacity="0.9">Discord</text>

    <!-- Telegram -->
    <rect x="-50" y="-18" width="130" height="36" rx="18" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <text x="15" y="6" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14" opacity="0.9">Telegram</text>

    <!-- AI CLI Hooks -->
    <rect x="110" y="-18" width="160" height="36" rx="18" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <text x="190" y="6" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14" opacity="0.9">AI CLI Hooks</text>

    <!-- Email -->
    <rect x="300" y="-18" width="100" height="36" rx="18" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <text x="350" y="6" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="14" opacity="0.9">Email</text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="460" text-anchor="middle" fill="#555555" font-family="monospace" font-size="18">Pure bash, zero dependencies</text>

  <!-- Bottom prompt -->
  <text x="100" y="530" fill="#666666" font-family="monospace" font-size="16">$ <tspan fill="#00ff41">alert</tspan> <tspan fill="#888888">make build &amp;&amp; deploy</tspan></text>

  <!-- Green accent line at bottom -->
  <rect x="60" y="568" width="1080" height="2" fill="#00ff41" opacity="0.3" rx="1"/>
</svg>
