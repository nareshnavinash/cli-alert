<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0a0a0a"/>

  <!-- Subtle grid lines -->
  <g opacity="0.03" stroke="#00ff41" stroke-width="0.5">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="440" x2="1280" y2="440"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="520" x2="1280" y2="520"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="40" y1="0" x2="40" y2="640"/>
    <line x1="80" y1="0" x2="80" y2="640"/>
    <line x1="120" y1="0" x2="120" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/>
    <line x1="280" y1="0" x2="280" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="360" y1="0" x2="360" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/>
    <line x1="440" y1="0" x2="440" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="520" y1="0" x2="520" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="680" y1="0" x2="680" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/>
    <line x1="760" y1="0" x2="760" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="840" y1="0" x2="840" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/>
    <line x1="920" y1="0" x2="920" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/>
    <line x1="1080" y1="0" x2="1080" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="1160" y1="0" x2="1160" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
    <line x1="1240" y1="0" x2="1240" y2="640"/>
  </g>

  <!-- Line 1: dim (30% opacity) -->
  <text x="640" y="150" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="26" fill="#00ff41" opacity="0.25" font-style="italic">
    knock knock knock... your terminal is waiting...
  </text>

  <!-- Line 2: medium (60% opacity) -->
  <text x="640" y="220" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="26" fill="#00ff41" opacity="0.5" font-style="italic">
    knock knock knock... your terminal is waiting...
  </text>

  <!-- Line 3: bright (100% opacity) with glow -->
  <text x="640" y="290" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="26" fill="#00ff41" opacity="1" font-style="italic" filter="url(#glow)">
    knock knock knock... your terminal is waiting...
  </text>

  <!-- Logo: >_ icon -->
  <rect x="462" y="370" width="56" height="56" rx="10" fill="#111111" stroke="#00ff41" stroke-width="1.5" opacity="0.8"/>
  <text x="490" y="408" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="30" font-weight="bold" fill="#00ff41" filter="url(#glow)">
    &gt;_
  </text>

  <!-- Logo: shelldone text -->
  <text x="680" y="410" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="52" font-weight="800" fill="#00ff41" filter="url(#glowStrong)" letter-spacing="3">
    shelldone
  </text>

  <!-- Subtitle -->
  <text x="640" y="470" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="20" fill="#888888">
    Never miss a finished build again.
  </text>

  <!-- Bottom accent line -->
  <rect x="440" y="510" width="400" height="2" rx="1" fill="#00ff41" opacity="0.3"/>

  <!-- Feature pills -->
  <text x="640" y="560" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#555555" letter-spacing="3">
    DESKTOP  ·  SLACK  ·  DISCORD  ·  AI CLI HOOKS  ·  PURE BASH
  </text>
</svg>
